# Render Blueprint — one-click deploy of the full SmartPark stack.
# Docs: https://render.com/docs/blueprint-spec
#
# Provisions: web service (Docker) + managed PostgreSQL + managed Redis.
# Secrets are auto-generated; DB/Redis URLs are wired in automatically.
#
# NOTE on background workers: Render Background Workers require a paid instance
# type (no free tier). The app runs fully without them — repricing happens
# synchronously on each booking/exit, and reservations still carry a TTL.
# To enable automatic reservation sweeps + periodic repricing, uncomment the
# `worker` and `beat` services below and pick a paid plan.

databases:
  - name: smartpark-db
    databaseName: smartpark
    user: smartpark
    plan: free

services:
  # --- Managed Redis (cache, rate-limit store, Socket.IO queue, Celery broker) ---
  - type: redis
    name: smartpark-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []   # internal-only

  # --- Web app (Docker) ---
  - type: web
    name: smartpark-web
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: AUTO_SEED            # create schema + seed demo admin/slots on first boot
        value: "1"
      - key: LOG_JSON
        value: "1"
      - key: METRICS_ENABLED
        value: "1"
      - key: PRICING_SURGE_ENABLED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: smartpark-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: smartpark-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: smartpark-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: smartpark-redis
          property: connectionString

  # --- Celery worker (reservation auto-release, async notifications) ---
  # Requires a paid plan. Uncomment to enable.
  # - type: worker
  #   name: smartpark-worker
  #   runtime: docker
  #   plan: starter
  #   dockerCommand: celery -A celery_worker.celery worker --loglevel=info -Q smartpark
  #   envVars:
  #     - key: FLASK_ENV
  #       value: production
  #     - key: SECRET_KEY
  #       fromService: { type: web, name: smartpark-web, envVarKey: SECRET_KEY }
  #     - key: DATABASE_URL
  #       fromDatabase: { name: smartpark-db, property: connectionString }
  #     - key: REDIS_URL
  #       fromService: { type: redis, name: smartpark-redis, property: connectionString }
  #     - key: CELERY_BROKER_URL
  #       fromService: { type: redis, name: smartpark-redis, property: connectionString }
  #     - key: CELERY_RESULT_BACKEND
  #       fromService: { type: redis, name: smartpark-redis, property: connectionString }

  # --- Celery beat (periodic repricing + reservation sweep schedule) ---
  # Requires a paid plan. Uncomment to enable.
  # - type: worker
  #   name: smartpark-beat
  #   runtime: docker
  #   plan: starter
  #   dockerCommand: celery -A celery_worker.celery beat --loglevel=info
  #   envVars:
  #     - key: FLASK_ENV
  #       value: production
  #     - key: SECRET_KEY
  #       fromService: { type: web, name: smartpark-web, envVarKey: SECRET_KEY }
  #     - key: DATABASE_URL
  #       fromDatabase: { name: smartpark-db, property: connectionString }
  #     - key: CELERY_BROKER_URL
  #       fromService: { type: redis, name: smartpark-redis, property: connectionString }
