services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartpark
      POSTGRES_PASSWORD: smartpark
      POSTGRES_DB: smartpark
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpark"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in your .env (never commit it)}
      DATABASE_URL: postgresql+psycopg://smartpark:smartpark@db:5432/smartpark
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      AUTO_SEED: "1"
      SESSION_COOKIE_SECURE: "0"
    ports:
      - "5000:5000"
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}

  worker:
    build: .
    command: celery -A celery_worker.celery worker --loglevel=info -Q smartpark
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in your .env (never commit it)}
      DATABASE_URL: postgresql+psycopg://smartpark:smartpark@db:5432/smartpark
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}

  beat:
    build: .
    command: celery -A celery_worker.celery beat -S redbeat.RedBeatScheduler --loglevel=info
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in your .env (never commit it)}
      DATABASE_URL: postgresql+psycopg://smartpark:smartpark@db:5432/smartpark
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}

  # --- Observability stack ---
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - web

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  promdata:
  grafanadata:
