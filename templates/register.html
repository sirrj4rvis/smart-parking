{% extends 'base.html' %}
{% block title %}Sign Up — SmartPark ITS{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card glass">
        <!-- Header -->
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Create Account</h1>
            <p>Join SmartPark ITS in seconds</p>
        </div>

        <!-- Registration Form -->
        <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form" id="registerForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="name">
                    <i class="fas fa-user"></i> Full Name
                </label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    class="form-input"
                    placeholder="John Doe"
                    required
                    autocomplete="name"
                >
            </div>

            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Email Address
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-input"
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Password
                </label>
                <div class="input-with-icon">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="Min. 6 characters"
                        required
                        minlength="6"
                        autocomplete="new-password"
                    >
                    <button type="button" class="toggle-password" onclick="togglePassword('password')" aria-label="Show password">
                        <i class="fas fa-eye" id="eyeIcon_password"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
                <i class="fas fa-rocket"></i> Create My Account
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}" class="link">Sign in here</a></p>
        </div>
    </div>
</section>
{% endblock %}
