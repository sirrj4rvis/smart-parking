{% extends 'base.html' %}
{% block title %}Login — SmartPark ITS{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card glass">
        <!-- Header -->
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-parking"></i>
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to your SmartPark account</p>
        </div>

        <!-- Login Form -->
        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Email Address
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-input"
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Password
                </label>
                <div class="input-with-icon">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" class="toggle-password" onclick="togglePassword('password')" aria-label="Show password">
                        <i class="fas fa-eye" id="eyeIcon_password"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <!-- Demo credentials hint -->
        <div class="demo-hint">
            <p><strong>Demo Admin:</strong> admin@parking.com / admin123</p>
        </div>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.register') }}" class="link">Sign up here</a></p>
        </div>
    </div>
</section>
{% endblock %}
