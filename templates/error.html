{% extends 'base.html' %}
{% block title %}{{ code }} — {{ title }}{% endblock %}

{% block content %}
<section class="error-section">
    <div class="error-card glass">
        <div class="error-code">{{ code }}</div>
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
        <a href="{{ url_for('public.index') }}" class="btn btn-primary">
            <i class="fas fa-home"></i> Back to Home
        </a>
    </div>
</section>
{% endblock %}
